server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    client_max_body_size 10M;

    location ^~ /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /sanctum {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ^~ /storage {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Короткие ссылки: один сегмент, кроме зарезервированных путей SPA (см. ReservedSlugs).
    location ~ "^/(?!api|login|register|sanctum|assets|storage|admin|spa|up|health)[a-zA-Z0-9_-]{1,32}$" {
        try_files $uri /index.php?$query_string;
    }

    # Angular 22 application builder: артефакты в public/spa/browser/
    # Важно: fallback через named location, иначе /index.html ищется в server root (/public).
    location / {
        root /var/www/html/public/spa/browser;
        index index.html;
        try_files $uri $uri/ @spa_fallback;
    }

    location @spa_fallback {
        root /var/www/html/public/spa/browser;
        try_files /index.html =404;
    }

    location ~ \.php$ {
        fastcgi_pass kutalo-links-php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
